# BNB flux projected to the nominal mean SBND baseline.
flux:
  file_pattern: /cvmfs/sbnd.osgstorage.org/pnfs/fnal.gov/usr/sbnd/persistent/stash/fluxFiles/bnb/G4BNB/v1.1.0/fhc/a/NuBeam*
  distance_m: 110.0
  center_m: [0.0, 0.0]
  window_size_m: [1.0, 1.0]
  flavors: [12, -12, 14, -14]
  max_energy_gev: 20.0
  max_weight_scan_entries: 250000
  # CVMFS paths are immutable: record the selected path without forcing a
  # complete payload read, then copy only that file into node-local scratch.
  checksum_files: false
  stage_to_local: true

tune: AR23_20i_00_000
spline: /opt/genie/xsec/gxspl-AR23_20i_00_000.xml
target_pdg: 1000180400
vertex_cm: [0.0, 0.0, 0.0]
