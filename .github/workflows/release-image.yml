name: Release production image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out release sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select immutable and rolling tags
        id: image-tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          image="ghcr.io/deeplearnphysics/dlpgen-opt"
          latest_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .id)"
          {
            echo 'tags<<EOF'
            echo "${image}:${RELEASE_TAG}"
            if [[ "${RELEASE_ID}" == "${latest_id}" ]]; then
              echo "${image}:latest"
            fi
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push the release image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha,scope=production-amd64
          cache-to: type=gha,mode=max,scope=production-amd64
          provenance: mode=max
          sbom: true
